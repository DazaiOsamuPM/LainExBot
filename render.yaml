# Render (Free tier) deployment example.
# Render Free plan requires an HTTP listener for health checks, so the bot boots a tiny
# /health server. If you deploy to a worker-only environment (fly.io, Railway worker,
# systemd, etc.) you can drop `start_health_server` from main.py and switch `type` to
# `worker` here.
services:
  - type: web
    name: telegram-downloader-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BOT_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "3"
      - key: MAX_USER_TASKS
        value: "2"
      # Public Bot API tops out at 50 MB per file. Raise only together with
      # TELEGRAM_API_BASE pointing at a self-hosted Telegram Bot API Server.
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: DOWNLOAD_TIMEOUT_SECONDS
        value: "600"
      - key: ALLOW_PRIVATE_URLS
        value: "false"
      - key: ENABLE_HEALTH_SERVER
        value: "true"
